project_name: food_roulette
description: 今天吃什么转盘抽奖脚本
architecture: script
requirements: |
  实现一个命令行交互式的“今天吃什么”大转盘抽奖。
  具体要求：
  1. 预设一份午餐/晚餐候选菜单（比如：火锅, 烧烤, 麦当劳, 肯德基, 炒饭, 麻辣烫, 沙拉, 饿着, 袁记云饺）。
  2. 运行时，用户按回车键开始抽奖。
  3. 为了制造“转盘”的紧张感，要在终端上打印滚动的候选菜单，并且速度越来越慢，最后定格在一个食物上，并恭喜用户。
  4. 抽奖结束后，询问用户是否重新抽奖（输入 q 退出，输入回车重抽）。
  5. 代码必须全部写在一个 main.py 里。